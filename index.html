<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYMA — Proposition d'identité</title>
  <meta name="description" content="Sept directions de logo proposées pour l'identité de SYMA. Comparez-les sur les couleurs de la marque, classez vos préférées et laissez votre retour." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0b0d10" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="SYMA — Proposition d'identité" />
  <meta property="og:description" content="Sept directions de logo à comparer, tester sur les couleurs de la marque et classer. Votre retour en quelques clics." />
  <meta property="og:image" content="og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SYMA — Proposition d'identité" />
  <meta name="twitter:description" content="Sept directions de logo à comparer, tester et classer." />
  <meta name="twitter:image" content="og-image.png" />

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Darumadrop+One&family=Fredoka:wght@400;500;600;700&family=Grandstander:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dev-immersive.css" />
</head>
<body class="dev-immersive" data-experience="immersive-gallery">
  <header class="site-header">
    <h1>SYMA Studio</h1>
  </header>

  <main>
    <nav class="page-tabs" aria-label="Sections SYMA">
      <div class="page-tabs__list" role="tablist">
        <button
          class="page-tabs__tab is-active"
          id="tab-logo-palette"
          type="button"
          role="tab"
          aria-selected="true"
          aria-controls="tabpanel-logo-palette"
          data-tab-target="tabpanel-logo-palette"
          data-tab-name="logo"
        >Logo & palette</button>
        <button
          class="page-tabs__tab"
          id="tab-iconographie"
          type="button"
          role="tab"
          aria-selected="false"
          aria-controls="tabpanel-iconographie"
          data-tab-target="tabpanel-iconographie"
          data-tab-name="iconography"
        >Iconographie</button>
        <button
          class="page-tabs__tab"
          id="tab-typographies"
          type="button"
          role="tab"
          aria-selected="false"
          aria-controls="tabpanel-typographies"
          data-tab-target="tabpanel-typographies"
          data-tab-name="typography"
        >Typographies</button>
      </div>
    </nav>

    <section
      class="tab-panel tab-panel--logo"
      id="tabpanel-logo-palette"
      role="tabpanel"
      aria-labelledby="tab-logo-palette"
    >
      <section class="intro" aria-labelledby="intro-title">
        <p class="eyebrow">Proposition d'identité</p>
        <h2 class="intro-title" id="intro-title">Sept directions de logo pour <span class="intro-accent">SYMA</span></h2>
        <p class="intro-lede">Comparez les directions, projetez-les sur les couleurs de la marque, puis classez vos préférées.</p>
      </section>

      <div id="final-choice-root"></div>

      <section class="comparator-section" aria-labelledby="comparator-title">
        <div class="section-heading section-heading--with-action">
          <div>
            <p class="eyebrow">Comparateur</p>
            <h2 id="comparator-title">Comparez les directions de logo</h2>
          </div>
          <div id="final-choice-action-root"></div>
        </div>
        <div class="comparator" aria-label="Comparateur de logos">
          <div class="comparator-panel" id="panel-left"></div>
          <div class="comparator-panel" id="panel-right"></div>
        </div>
      </section>
    </section>

    <section
      class="tab-panel tab-panel--iconography"
      id="tabpanel-iconographie"
      role="tabpanel"
      aria-labelledby="tab-iconographie"
      hidden
    >
      <div id="iconography-root"></div>
    </section>

    <section
      class="tab-panel tab-panel--typography"
      id="tabpanel-typographies"
      role="tabpanel"
      aria-labelledby="tab-typographies"
      hidden
    >
      <div id="typography-root"></div>
    </section>
  </main>

  <div id="submission-bar-root"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
